<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aktie Spillet</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; text-align: center; background-color:#111; color:white; }
.container { margin-top:10px; }
.box { background:#222; padding:10px; margin:6px auto; width:260px; border-radius:10px; font-size:16px; }
button { padding:10px 16px; margin:5px; font-size:14px; border:none; border-radius:8px; cursor:pointer; }
#buy { background:red; color:white; }
#sell { background:green; color:white; }
#buyAll { background:darkred; color:white; }
#sellAll { background:darkgreen; color:white; }
button:disabled { opacity:0.5; cursor:not-allowed; }
canvas { background:white; border-radius:10px; margin:10px auto; width:90%; max-width:320px; height:170px !important; display:block; }
</style>
</head>
<body>

<h1>AktieSpillet 📈</h1>

<div class="container">
    <div class="box">Aktie kurs: <span id="price">100</span> kr</div>
    <div class="box">Dine penge: <span id="money">1000</span> kr</div>
    <div class="box">Antal aktier: <span id="stocks">0</span></div>

    <button id="buy">Køb</button>
    <button id="sell">Sælg</button><br>
    <button id="buyAll">Køb alle</button>
    <button id="sellAll">Sælg alle</button>
</div>

<canvas id="chart"></canvas>

<script>
let money = 1000;
let price = 100;
let stocks = 0;
let history = [price];

const priceEl = document.getElementById("price");
const moneyEl = document.getElementById("money");
const stocksEl = document.getElementById("stocks");

const ctx = document.getElementById("chart").getContext("2d");
const chart = new Chart(ctx, {
    type: 'line',
    data: { 
        labels: [], 
        datasets: [{ 
            label: 'Aktiekurs', 
            data: history, 
            borderColor:'blue', 
            fill:false 
        }] 
    },
    options: { 
        responsive:true, 
        maintainAspectRatio:false, 
        animation:false,
        scales:{y:{beginAtZero:false}} 
    }
});

let minPrice = 50;
const maxPrice = 140;
const cycleDuration = 5*60*1000;

let cycleStart = Date.now();
let falling = false;
let recovering = false;

setInterval(() => {

    const now = Date.now();
    const elapsed = now - cycleStart;
    const timeLeft = cycleDuration - elapsed;

    // NORMAL FASE
    if(!falling && !recovering){

        price += 0.3 + (Math.random()*2 - 1.2);

        // Må ikke ramme 140 før sidste minut
        if(timeLeft > 60000 && price > 135){
            price = 135;
        }

        if(elapsed > cycleDuration){
            falling = true;
        }
    }

    // STYRTDYK
    else if(falling){

        price -= 4 + Math.random()*5;

        if(price <= minPrice){
            price = minPrice;
            falling = false;
            recovering = true;
        }
    }

    // LANGSOM RECOVERY
    else if(recovering){

        let volatility = Math.random()*3 - 1.5;
        price += 0.8 + volatility;

        // Før sidste minut må den ikke bryde 135
        if(timeLeft > 60000 && price > 135){
            price = 135;
        }

        // Når den rammer 140 → nyt mindre fald til 110-120
        if(price >= 140){
            price = 140;
            recovering = false;
            falling = true;
            minPrice = 110 + Math.random()*10;
            cycleStart = Date.now();
        }
    }

    if(price > maxPrice) price = maxPrice;
    if(price < minPrice) price = minPrice;

    price = Math.round(price);

    history.push(price);
    if(history.length > 30) history.shift();

    chart.data.labels.push("");
    if(chart.data.labels.length > 30) chart.data.labels.shift();

    chart.data.datasets[0].data = history;
    chart.update();

    updateUI();

}, 1000);

document.getElementById("buy").onclick = () => { 
    if(money >= price){
        money -= price; 
        stocks++; 
        updateUI(); 
    }
};

document.getElementById("sell").onclick = () => { 
    if(stocks > 0){
        money += price; 
        stocks--; 
        updateUI();
    }
};

document.getElementById("buyAll").onclick = () => { 
    let amount = Math.floor(money/price); 
    stocks += amount; 
    money -= amount*price; 
    updateUI(); 
};

document.getElementById("sellAll").onclick = () => { 
    money += stocks*price; 
    stocks = 0; 
    updateUI(); 
};

function updateUI(){
    priceEl.textContent = price;
    moneyEl.textContent = Math.round(money);
    stocksEl.textContent = stocks;

    if(money < 0){
        alert("GAME OVER 💀 Du gik i minus!");
        location.reload();
    }
}
</script>

</body>
</html>
